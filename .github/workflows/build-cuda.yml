name: Build llama.cpp forks with CUDA

# Best-of-all multi-fork CUDA builder.
# Builds 4 llama.cpp forks for CUDA 13.2 (RTX 5090 / sm_120 + all prior gens), amd64 only:
#   - vanilla      : ggml-org/llama.cpp            (tracked by release tag)
#   - turboquant   : TheTom/llama-cpp-turboquant   (feature/turboquant-kv-cache)
#   - atomic       : AtomicBot-ai/...turboquant     (feature/turboquant-kv-cache)
#   - prism        : PrismML-Eng/llama.cpp          (prism branch, Q2_0 ternary)
# All use the SAME standard CMake build (GGML_CUDA=ON). Binaries land in
# separate subdirs so they never collide: cuda-13.2/<subdir>/llama-server.
# Source of truth for what to build: forks.json (committed in repo).
on:
  schedule:
    # Daily at 00:00 UTC — catches new vanilla releases and fork branch moves.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all forks even if unchanged'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-forks:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Plan which forks changed
        id: plan
        run: |
          FORCE="${{ github.event.inputs.force_build }}"
          # state.json holds last-built ref per fork; default empty.
          STATE=$(cat state.json 2>/dev/null || echo '{}')

          COUNT=$(jq '.forks | length' forks.json)
          MATRIX_ITEMS="[]"
          for i in $(seq 0 $((COUNT-1))); do
            NAME=$(jq -r ".forks[$i].name" forks.json)
            REPO=$(jq -r ".forks[$i].repo" forks.json)
            BRANCH=$(jq -r ".forks[$i].branch // \"\"" forks.json)
            TRACK=$(jq -r ".forks[$i].track" forks.json)
            SUBDIR=$(jq -r ".forks[$i].subdir" forks.json)

            if [ "$TRACK" = "release" ]; then
              REF=$(curl -s "https://api.github.com/repos/${REPO}/releases" | jq -r '.[0].tag_name')
              REF_TYPE="tag"
            else
              REF=$(curl -s "https://api.github.com/repos/${REPO}/commits/${BRANCH}" | jq -r '.sha')
              REF_TYPE="commit"
            fi

            LAST=$(echo "$STATE" | jq -r --arg n "$NAME" '.[$n] // ""')
            echo "Fork $NAME: track=$TRACK ref=$REF last=$LAST"
            if [ "$FORCE" = "true" ] || [ "$REF" != "$LAST" ]; then
              echo "  -> changed, will build"
              ITEM=$(jq -n --arg name "$NAME" --arg repo "$REPO" --arg branch "$BRANCH" \
                          --arg reftype "$REF_TYPE" --arg ref "$REF" --arg subdir "$SUBDIR" \
                          '{name:$name, repo:$repo, branch:$branch, reftype:$reftype, ref:$ref, subdir:$subdir}')
              MATRIX_ITEMS=$(echo "$MATRIX_ITEMS" | jq --argjson it "$ITEM" '. + [$it]')
            else
              echo "  -> unchanged, skip"
            fi
          done

          echo "matrix=$(echo "$MATRIX_ITEMS" | jq -c '{include: .}')" >> $GITHUB_OUTPUT

  build:
    needs: check-forks
    if: needs.check-forks.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest   # amd64 only (RTX 5090 host)
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-forks.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Maximize build space
        run: |
          echo "=== Initial Disk Space ==="
          df -h
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri --fix-missing || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          docker system prune -af || true
          echo "=== After Cleanup ==="
          df -h

      - name: Setup Compiler Cache (ccache)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-cuda13.2-${{ matrix.name }}-${{ matrix.ref }}
          restore-keys: |
            ${{ runner.os }}-ccache-cuda13.2-${{ matrix.name }}-

      - name: Build ${{ matrix.name }} with CUDA
        env:
          CUDA_TAG: '13.2.0-cudnn-devel-ubuntu24.04'
          ARCHS: '75;80;86;89;90;100;120'
          SUBDIR: ${{ matrix.subdir }}
          REPO: ${{ matrix.repo }}
          BRANCH: ${{ matrix.branch }}
          REF: ${{ matrix.ref }}
          REFTYPE: ${{ matrix.reftype }}
        run: |
          mkdir -p $PWD/.ccache
          docker pull nvidia/cuda:${CUDA_TAG}
          docker run --rm \
            -v $PWD:/workspace \
            -v $PWD/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            nvidia/cuda:${CUDA_TAG} \
            bash -c "
              set -e
              apt-get update -qq
              apt-get install -y --no-install-recommends git cmake ninja-build build-essential libssl-dev ca-certificates ccache lld
              apt-get clean
              rm -rf /var/lib/apt/lists/*

              ccache -M 3G
              ccache -z

              cd /workspace
              if [ -n \"\$BRANCH\" ]; then
                git clone --branch \"\$BRANCH\" https://github.com/\${REPO}.git src
                cd src && git checkout \"\$REF\" && cd ..
              else
                git clone https://github.com/\${REPO}.git src
                cd src && git checkout \"\$REF\" && cd ..
              fi
              cd src

              export LIBRARY_PATH=\"/usr/local/cuda/lib64/stubs\${LIBRARY_PATH:+:\$LIBRARY_PATH}\"
              ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1

              cmake -B build -S . \
                -G Ninja \
                -DGGML_CUDA=ON \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CUDA_ARCHITECTURES='\${ARCHS}' \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SHARED_LIBS=ON \
                -DGGML_NATIVE=OFF \
                -DLLAMA_BUILD_TESTS=OFF \
                -DLLAMA_BUILD_EXAMPLES=OFF \
                -DCMAKE_EXE_LINKER_FLAGS='-fuse-ld=lld -Wl,-rpath-link,/usr/local/cuda/lib64/stubs' \
                -DCMAKE_SHARED_LINKER_FLAGS='-fuse-ld=lld -Wl,-rpath-link,/usr/local/cuda/lib64/stubs'

              cmake --build build --config Release -j\$(nproc)

              echo '=== CCache Statistics ==='
              ccache -s

              cd /workspace
              mkdir -p binaries/cuda-13.2/\${SUBDIR}
              cp -r src/build/bin/* binaries/cuda-13.2/\${SUBDIR}/

              # Bundle CUDA runtime so users don't need the full toolkit installed
              CUDA_LIB=/usr/local/cuda/targets/x86_64-linux/lib
              cp -a \${CUDA_LIB}/libcudart.so* binaries/cuda-13.2/\${SUBDIR}/
              cp -a \${CUDA_LIB}/libcublas.so* binaries/cuda-13.2/\${SUBDIR}/
              cp -a \${CUDA_LIB}/libcublasLt.so* binaries/cuda-13.2/\${SUBDIR}/

              find binaries/cuda-13.2/\${SUBDIR}/ -type f -executable ! -name '*.so*' -exec strip {} \; 2>/dev/null || true

              echo 'fork: \${REPO} (\${BRANCH:-release})' > binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'ref: \${REF}' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'CUDA version: 13.2.0' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'Architectures: \${ARCHS}' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'Build date: '\$(date -u +%Y-%m-%d) >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt

              ls -lh binaries/cuda-13.2/\${SUBDIR}/
              rm -rf src
            "

          docker rmi nvidia/cuda:${CUDA_TAG} || true
          sudo chown -R $(id -u):$(id -g) $PWD
          df -h

      - name: Create tarball
        run: |
          cd binaries
          tar -czf llama.cpp-cuda-13.2-${{ matrix.name }}-amd64.tar.gz cuda-13.2
          ls -lh *.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama.cpp-cuda-13.2-${{ matrix.name }}-amd64
          path: binaries/*.tar.gz
          retention-days: 1

      - name: Record built ref into state.json
        run: |
          STATE=$(cat state.json 2>/dev/null || echo '{}')
          echo "$STATE" | jq --arg n "${{ matrix.name }}" --arg r "${{ matrix.ref }}" '.[$n]=$r' > state.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "ci: record ${{ matrix.name }} ref ${{ matrix.ref }}" || echo "no change"
          git push || echo "push failed (likely concurrent run)"

  release:
    needs: [check-forks, build]
    if: needs.check-forks.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create / update release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cuda-13.2-build-$(date -u +%Y%m%d)
          name: CUDA 13.2 multi-fork build $(date -u +%Y-%m-%d)
          body: |
            # llama.cpp forks — CUDA 13.2 (RTX 5090 / sm_120)

            Pre-built llama.cpp CUDA binaries for **CUDA 13.2**, amd64 only, built from multiple forks.
            Each fork lives in its own subdir inside the tarball: `cuda-13.2/<fork>/llama-server`.

            | Fork | Source | Path in tarball |
            |------|--------|-----------------|
            | vanilla | ggml-org/llama.cpp | `cuda-13.2/vanilla/` |
            | turboquant | TheTom/llama-cpp-turboquant | `cuda-13.2/turboquant/` |
            | atomic | AtomicBot-ai/atomic-llama-cpp-turboquant | `cuda-13.2/atomic/` |
            | prism | PrismML-Eng/llama.cpp | `cuda-13.2/prism/` |

            ## Requirements
            - NVIDIA driver >= 580.13 (CUDA 13.2)
            - CUDA runtime libs are **bundled** in each tarball — no toolkit install needed
            - Compute capabilities: 7.5, 8.0, 8.6, 8.9, 9.0, 10.0, 12.0

            ## Usage
            ```bash
            tar -xzf llama.cpp-cuda-13.2-<fork>-amd64.tar.gz
            cd cuda-13.2/<fork>
            ./llama-server -m model.gguf
            ```
          files: release-assets/*
          draft: false
          prerelease: false
