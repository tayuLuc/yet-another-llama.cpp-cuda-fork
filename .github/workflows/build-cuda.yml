name: Build llama.cpp forks with CUDA

# Best-of-all multi-fork CUDA builder.
# Builds 4 llama.cpp forks for CUDA 13.2 (RTX 5090 / sm_120 + all prior gens), amd64 only:
#   - vanilla      : ggml-org/llama.cpp
#   - turboquant   : TheTom/llama-cpp-turboquant
#   - atomic       : AtomicBot-ai/atomic-llama-cpp-turboquant
#   - prism        : PrismML-Eng/llama.cpp
# For EVERY fork we detect TWO independent sources and emit up to two release builds:
#   - stable : latest GitHub release of the fork (prerelease releases are treated as
#              releases too — we only need the source commit, never the release binaries).
#   - nightly: HEAD commit of the fork's tracked branch.
# Binaries land in separate subdirs so they never collide: cuda-13.2/<subdir>/llama-server.
# Source of truth for what to build: forks.json (committed in repo).
on:
  schedule:
    # Daily at 00:00 UTC — catches new releases and branch moves.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all forks (stable+nightly) even if unchanged'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-forks:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Restore last-built refs from Actions cache (one key per fork+mode).
      # Cache TTL is set in repo Settings > Actions > General > Cache
      # (public repos cap at 7 days; self-hosted/paid can raise it).
      - name: Restore last-built refs (cache)
        id: restore-refs
        uses: actions/cache@v4
        with:
          path: .cache-refs
          key: fork-refs-v2-${{ github.run_id }}
          restore-keys: |
            fork-refs-v2-

      - name: Plan which forks changed
        id: plan
        run: |
          FORCE="${{ github.event.inputs.force_build }}"

          COUNT=$(jq '.forks | length' forks.json)
          MATRIX_ITEMS="[]"

          for i in $(seq 0 $((COUNT-1))); do
            NAME=$(jq -r ".forks[$i].name" forks.json)
            REPO=$(jq -r ".forks[$i].repo" forks.json)
            BRANCH=$(jq -r ".forks[$i].branch // \"\"" forks.json)
            SUBDIR=$(jq -r ".forks[$i].subdir" forks.json)

            # ---- STABLE: latest release (prerelease releases count as releases) ----
            REL=$(curl -s "https://api.github.com/repos/${REPO}/releases" | jq -r '.[0] // empty')
            if [ -n "$REL" ]; then
              REL_TAG=$(echo "$REL" | jq -r '.tag_name')
              REL_PRE=$(echo "$REL" | jq -r '.prerelease')
              REL_REF=$(echo "$REL" | jq -r '.target_commitish')
              # target_commitish may be a branch name (e.g. turboquant) -> resolve to SHA
              if ! echo "$REL_REF" | grep -qE '^[0-9a-f]{40}$'; then
                REL_REF=$(curl -s "https://api.github.com/repos/${REPO}/commits/${REL_REF}" | jq -r '.sha')
              fi
              STABLE_REF="$REL_REF"
              STABLE_TAG="$REL_TAG"
              STABLE_PRE="$REL_PRE"
            else
              STABLE_REF=""
              STABLE_TAG=""
              STABLE_PRE="false"
            fi

            # ---- NIGHTLY: HEAD of tracked branch (only if a branch is configured) ----
            if [ -n "$BRANCH" ]; then
              NIGHTLY_REF=$(curl -s "https://api.github.com/repos/${REPO}/commits/${BRANCH}" | jq -r '.sha')
            else
              NIGHTLY_REF=""
            fi

            # ---- Emit matrix items, comparing against last-built refs ----
            LAST_STABLE=$(cat ".cache-refs/${NAME}-stable.txt" 2>/dev/null || echo "")
            LAST_NIGHTLY=$(cat ".cache-refs/${NAME}-nightly.txt" 2>/dev/null || echo "")

            if [ -n "$STABLE_REF" ] && { [ "$FORCE" = "true" ] || [ "$STABLE_REF" != "$LAST_STABLE" ]; }; then
              echo "Fork $NAME: stable ref=$STABLE_REF (tag=$STABLE_TAG, prerelease=$STABLE_PRE) -> changed"
              ITEM=$(jq -n --arg name "$NAME" --arg repo "$REPO" --arg branch "$BRANCH" \
                      --arg mode "stable" --arg ref "$STABLE_REF" --arg reltag "$STABLE_TAG" \
                      --arg pre "$STABLE_PRE" --arg subdir "$SUBDIR" \
                      '{name:$name, repo:$repo, branch:$branch, mode:$mode, ref:$ref, reltag:$reltag, prerelease:$pre, subdir:$subdir}')
              MATRIX_ITEMS=$(echo "$MATRIX_ITEMS" | jq --argjson it "$ITEM" '. + [$it]')
            else
              echo "Fork $NAME: stable ref=$STABLE_REF unchanged (last=$LAST_STABLE)"
            fi

            if [ -n "$NIGHTLY_REF" ] && { [ "$FORCE" = "true" ] || [ "$NIGHTLY_REF" != "$LAST_NIGHTLY" ]; }; then
              echo "Fork $NAME: nightly ref=$NIGHTLY_REF -> changed"
              ITEM=$(jq -n --arg name "$NAME" --arg repo "$REPO" --arg branch "$BRANCH" \
                      --arg mode "nightly" --arg ref "$NIGHTLY_REF" --arg reltag "" \
                      --arg pre "true" --arg subdir "$SUBDIR" \
                      '{name:$name, repo:$repo, branch:$branch, mode:$mode, ref:$ref, reltag:$reltag, prerelease:$pre, subdir:$subdir}')
              MATRIX_ITEMS=$(echo "$MATRIX_ITEMS" | jq --argjson it "$ITEM" '. + [$it]')
            else
              echo "Fork $NAME: nightly ref=$NIGHTLY_REF unchanged (last=$LAST_NIGHTLY)"
            fi
          done

          echo "matrix=$(echo "$MATRIX_ITEMS" | jq -c '{include: .}')" >> $GITHUB_OUTPUT

  build:
    needs: check-forks
    if: needs.check-forks.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest   # amd64 only (RTX 5090 host)
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-forks.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Maximize build space
        run: |
          echo "=== Initial Disk Space ==="
          df -h
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri --fix-missing || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          docker system prune -af || true
          echo "=== After Cleanup ==="
          df -h

      - name: Setup Compiler Cache (ccache)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-cuda13.2-${{ matrix.name }}-${{ matrix.mode }}-${{ matrix.ref }}
          restore-keys: |
            ${{ runner.os }}-ccache-cuda13.2-${{ matrix.name }}-${{ matrix.mode }}-

      - name: Build ${{ matrix.name }} (${{ matrix.mode }}) with CUDA
        env:
          CUDA_TAG: '13.2.0-cudnn-devel-ubuntu24.04'
          ARCHS: '75;80;86;89;90;100;120'
          SUBDIR: ${{ matrix.subdir }}
          REPO: ${{ matrix.repo }}
          BRANCH: ${{ matrix.branch }}
          REF: ${{ matrix.ref }}
          RELTAG: ${{ matrix.reltag }}
          MODE: ${{ matrix.mode }}
        run: |
          mkdir -p $PWD/.ccache
          docker pull nvidia/cuda:${CUDA_TAG}
          docker run --rm \
            -v $PWD:/workspace \
            -v $PWD/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            -e REPO="${REPO}" \
            -e BRANCH="${BRANCH}" \
            -e REF="${REF}" \
            -e RELTAG="${RELTAG}" \
            -e MODE="${MODE}" \
            -e SUBDIR="${SUBDIR}" \
            -e ARCHS="${ARCHS}" \
            nvidia/cuda:${CUDA_TAG} \
            bash -c "
              set -e
              apt-get update -qq
              apt-get install -y --no-install-recommends git cmake ninja-build build-essential libssl-dev ca-certificates ccache lld
              apt-get clean
              rm -rf /var/lib/apt/lists/*

              ccache -M 3G
              ccache -z

              cd /workspace
              if [ -n \"\$BRANCH\" ]; then
                git clone --branch \"\$BRANCH\" https://github.com/\${REPO}.git src
                cd src && git checkout \"\$REF\" && cd ..
              else
                git clone https://github.com/\${REPO}.git src
                cd src && git checkout \"\$REF\" && cd ..
              fi
              cd src

              export LIBRARY_PATH=\"/usr/local/cuda/lib64/stubs\${LIBRARY_PATH:+:\$LIBRARY_PATH}\"
              ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1

              cmake -B build -S . \
                -G Ninja \
                -DGGML_CUDA=ON \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CUDA_ARCHITECTURES='${{ env.ARCHS }}' \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SHARED_LIBS=ON \
                -DGGML_NATIVE=OFF \
                -DLLAMA_BUILD_TESTS=OFF \
                -DLLAMA_BUILD_EXAMPLES=OFF \
                -DCMAKE_EXE_LINKER_FLAGS='-fuse-ld=lld -Wl,-rpath-link,/usr/local/cuda/lib64/stubs' \
                -DCMAKE_SHARED_LINKER_FLAGS='-fuse-ld=lld -Wl,-rpath-link,/usr/local/cuda/lib64/stubs'

              cmake --build build --config Release -j\$(nproc)

              echo '=== CCache Statistics ==='
              ccache -s

              cd /workspace
              mkdir -p binaries/cuda-13.2/\${SUBDIR}
              cp -r src/build/bin/* binaries/cuda-13.2/\${SUBDIR}/

              # Bundle CUDA runtime so users don't need the full toolkit installed
              CUDA_LIB=/usr/local/cuda/targets/x86_64-linux/lib
              cp -a \${CUDA_LIB}/libcudart.so* binaries/cuda-13.2/\${SUBDIR}/
              cp -a \${CUDA_LIB}/libcublas.so* binaries/cuda-13.2/\${SUBDIR}/
              cp -a \${CUDA_LIB}/libcublasLt.so* binaries/cuda-13.2/\${SUBDIR}/

              find binaries/cuda-13.2/\${SUBDIR}/ -type f -executable ! -name '*.so*' -exec strip {} \; 2>/dev/null || true

              echo 'fork: \${REPO} (\${BRANCH:-release})' > binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'mode: \${MODE}' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'ref: \${REF}' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'release-tag: \${RELTAG}' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'CUDA version: 13.2.0' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'Architectures: ${{ env.ARCHS }}' >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt
              echo 'Build date: '\$(date -u +%Y-%m-%d) >> binaries/cuda-13.2/\${SUBDIR}/VERSION.txt

              ls -lh binaries/cuda-13.2/\${SUBDIR}/
              rm -rf src
            "

          docker rmi nvidia/cuda:${CUDA_TAG} || true
          sudo chown -R $(id -u):$(id -g) $PWD
          df -h

      - name: Create tarball
        run: |
          cd binaries
          tar -czf llama.cpp-cuda-13.2-${{ matrix.name }}-${{ matrix.mode }}-amd64.tar.gz cuda-13.2
          ls -lh *.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama.cpp-cuda-13.2-${{ matrix.name }}-${{ matrix.mode }}-amd64
          path: binaries/*.tar.gz
          retention-days: 1

      - name: Write built ref
        run: |
          mkdir -p .cache-refs
          echo "${{ matrix.ref }}" > ".cache-refs/${{ matrix.name }}-${{ matrix.mode }}.txt"

      # Save all fork refs; check-forks restores via restore-keys "fork-refs-v2-".
      - name: Save built refs to cache
        uses: actions/cache@v4
        with:
          path: .cache-refs
          key: fork-refs-v2-${{ github.run_id }}-${{ matrix.name }}-${{ matrix.mode }}
          restore-keys: |
            fork-refs-v2-
          save-always: true

  release:
    needs: [check-forks, build]
    if: needs.check-forks.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create per-fork releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in release-assets/*.tar.gz; do
            base=$(basename "$f" .tar.gz)   # llama.cpp-cuda-13.2-<name>-<mode>-amd64
            mode=$(echo "$base" | grep -oE 'stable|nightly' | head -1)
            name=$(echo "$base" | sed -E "s/^llama\.cpp-cuda-13\.2-//; s/-amd64\$//; s/-${mode}\$//")
            if [ "$mode" = "stable" ]; then
              reltag=$(tar -xzOf "$f" cuda-13.2/*/VERSION.txt 2>/dev/null | awk -F': ' '/release-tag/{print $2}')
              tag="${name}-${reltag}"
              prerelease="false"
            else
              sha=$(tar -xzOf "$f" cuda-13.2/*/VERSION.txt 2>/dev/null | awk -F': ' '/ref/{print $2}')
              tag="${name}-nightly-${sha:0:12}"
              prerelease="true"
            fi
            echo "Publishing $tag (prerelease=$prerelease) from $f"
            gh release create "$tag" "$f" \
              --repo "${{ github.repository }}" \
              --title "$tag" \
              --notes "CUDA 13.2 (RTX 5090 / sm_120) build of **$name** ($mode)." \
              $( [ "$prerelease" = "true" ] && echo "--prerelease" )
          done

      - name: Trigger image repo build
        env:
          GH_TOKEN: ${{ secrets.IMAGE_REPO_TOKEN }}
        run: |
          MATRIX='${{ needs.check-forks.outputs.matrix }}'
          if echo "$MATRIX" | grep -q '"mode":"nightly"'; then
            IMG_MODE=nightly
          else
            IMG_MODE=stable
          fi
          echo "Triggering image repo build (mode=$IMG_MODE)"
          gh workflow run build-image.yml \
            --repo tayuLuc/llama-swap-cuda-images \
            -f mode="$IMG_MODE" || echo "Image repo trigger skipped (token/permission missing)"
