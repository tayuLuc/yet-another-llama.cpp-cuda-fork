# llama-swap config — picks a different llama.cpp fork binary per model.
# Binary paths point at the forks unpacked by the Dockerfile into /opt/llama/<name>/.
# Map your GGUF files under /models (mounted at runtime).

models:
  # Vanilla ggml-org build.
  - name: "qwen2.5-7b"
    path: "/models/qwen2.5-7b-instruct-q4_k_m.gguf"
    llama_cpp_binary: "/opt/llama/vanilla/llama-server"
    env:
      LLAMA_ARG: "--ctx-size 8192"

  # TurboQuant+ — KV-cache compression for long context.
  - name: "llama3.1-8b-turbo"
    path: "/models/llama-3.1-8b-instruct-q4_k_m.gguf"
    llama_cpp_binary: "/opt/llama/turboquant/llama-server"
    env:
      LLAMA_ARG: "--ctx-size 131072 --cache-type-k q8_0 --cache-type-v turbo3"

  # Atomic fork — Gemma4 MTP / Qwen3.6 NextN speculative decoding.
  - name: "gemma4-27b-atomic"
    path: "/models/gemma-4-27b-it-q4_k_m.gguf"
    llama_cpp_binary: "/opt/llama/atomic/llama-server"
    env:
      LLAMA_ARG: "--ctx-size 16384 -ngl 99"

  # Prism fork — loads Q2_0 ternary (Bonsai) GGUFs.
  - name: "bonsai-prism"
    path: "/models/bonsai-model-Q2_0.gguf"
    llama_cpp_binary: "/opt/llama/prism/llama-server"
